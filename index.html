<!DOCTYPE html>
<html>
<head>
  <title>视频评分系统</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 0 auto; padding: 20px; }
    video { width: 100%; background: #000; margin-bottom: 20px; }
    form { border: 1px solid #ddd; padding: 15px; margin-bottom: 40px; }
  </style>
</head>
<body>

  <!-- 视频1 -->
  <div class="video-container">
    <h2>视频1：浑元形意实验室</h2>
    <video controls src="https://video-rating-1308430912.cos.ap-guangzhou.myqcloud.com/ai/【P6】【AI全自动-鬼畜生成】浑元形意实验室主任马老师.mp4"></video>
    <form action="https://docs.google.com/forms/d/e/1FAIpQLSdeecVXBJoyhCsZJACTCwjrq8dUUmHUJ-c6fjc4O1Be3IvVWQ/formResponse" method="POST">
      <input type="hidden" name="entry.123456" value="video1"> <!-- 视频ID字段 -->
      <label>评分（1-5分）：</label>
      <input type="number" name="entry.187263512" min="1" max="5" required> <!-- 替换为你的评分字段ID -->
      <button type="submit">提交评分</button>
    </form>
  </div>

  <!-- 视频2 -->
  <div class="video-container">
    <h2>视频2：蜘蛛侠纵横宇宙</h2>
    <video controls src="https://video-rating-1308430912.cos.ap-guangzhou.myqcloud.com/ai/【P6】【AI全自动-卡点混剪】蜘蛛侠：纵横宇宙.mp4"></video>
    <form action="https://docs.google.com/forms/d/e/1FAIpQLSdeecVXBJoyhCsZJACTCwjrq8dUUmHUJ-c6fjc4O1Be3IvVWQ/formResponse" method="POST">
      <input type="hidden" name="entry.123456" value="video2"> <!-- 视频ID字段 -->
      <label>评分（1-5分）：</label>
      <input type="number" name="entry.187263512" min="1" max="5" required>
      <button type="submit">提交评分</button>
    </form>
  </div>

</body>
</html>
